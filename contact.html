<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>联系我们 - 洽小秘</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap');
    body {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      background: linear-gradient(180deg, #000000 0%, #0a0a0a 48%, #000000 100%);
    }
    .page-grid {
      background-image:
        linear-gradient(rgba(148, 163, 184, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.035) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.55), transparent 78%);
    }
    .ambient-orb { filter: blur(64px); opacity: 0.7; }
    .glass-card {
      background: linear-gradient(180deg, rgba(20, 20, 20, 0.78), rgba(10, 10, 10, 0.54));
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(18px);
    }
  </style>
</head>
<body class="text-white antialiased selection:bg-orange-500/30">
  <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
    <div class="page-grid absolute inset-0"></div>
    <div class="ambient-orb absolute left-[12%] top-0 h-72 w-72 rounded-full bg-orange-500/15"></div>
    <div class="ambient-orb absolute right-[10%] top-28 h-80 w-80 rounded-full bg-red-500/10"></div>
  </div>

  <nav class="sticky top-0 z-50 border-b border-white/10 bg-black/80 backdrop-blur-xl">
    <div class="container mx-auto flex items-center justify-between px-6 py-4">
      <a href="/landing.html" class="text-xl font-bold tracking-[-0.03em] text-white">洽小秘</a>
      <div class="flex items-center gap-8">
        <div class="hidden md:flex items-center gap-8 text-base font-semibold text-slate-200">
          <a href="/landing.html" class="transition-colors hover:text-orange-200">产品首页</a>
          <a href="/download.html" class="transition-colors hover:text-orange-200">下载中心</a>
          <a href="/team.html" class="transition-colors hover:text-orange-200">团队介绍</a>
          <a href="/contact.html" class="text-orange-300 transition-colors hover:text-orange-200">联系我们</a>
        </div>
        <a href="http://localhost:5174/?admin=true" class="rounded-lg border border-orange-400/30 bg-orange-500/10 px-4 py-2 text-sm font-semibold text-orange-200 transition-all hover:border-orange-400/50 hover:bg-orange-500/20">登录</a>
      </div>
    </div>
  </nav>

  <div class="container mx-auto px-6 pb-20 md:pb-24">
    <section class="relative min-h-screen py-24">
      <div class="mx-auto mb-16 max-w-3xl text-center">
        <div class="mb-4 inline-flex rounded-full border border-orange-400/15 bg-orange-500/10 px-4 py-2 text-sm text-orange-100/90 backdrop-blur">
          Contact Us
        </div>
        <h1 class="mb-4 text-5xl font-bold tracking-[-0.05em] text-white md:text-7xl">联系我们</h1>
        <p class="text-lg leading-8 text-slate-300 md:text-xl">我们随时准备为您提供帮助，欢迎通过以下方式与我们取得联系。</p>
      </div>

      <div class="mx-auto grid max-w-6xl gap-8 md:grid-cols-2">
        <div class="glass-card rounded-[32px] p-8 md:p-10">
          <h2 class="mb-6 text-2xl font-bold">商务合作</h2>
          <div class="space-y-4">
            <div class="flex items-start gap-4">
              <div class="flex h-10 w-10 flex-shrink-0 items-center justify-center rounded-lg bg-orange-500/20">
                <svg class="h-5 w-5 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
              </div>
              <div>
                <h3 class="mb-1 font-semibold">邮箱</h3>
                <p class="text-slate-300">business@chamie.ai</p>
              </div>
            </div>
            <div class="flex items-start gap-4">
              <div class="flex h-10 w-10 flex-shrink-0 items-center justify-center rounded-lg bg-orange-500/20">
                <svg class="h-5 w-5 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                </svg>
              </div>
              <div>
                <h3 class="mb-1 font-semibold">电话</h3>
                <p class="text-slate-300">+86 400-123-4567</p>
              </div>
            </div>
          </div>
        </div>

        <div class="glass-card rounded-[32px] p-8 md:p-10">
          <h2 class="mb-6 text-2xl font-bold">技术支持</h2>
          <div class="space-y-4">
            <div class="flex items-start gap-4">
              <div class="flex h-10 w-10 flex-shrink-0 items-center justify-center rounded-lg bg-orange-500/20">
                <svg class="h-5 w-5 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                </svg>
              </div>
              <div>
                <h3 class="mb-1 font-semibold">邮箱</h3>
                <p class="text-slate-300">support@chamie.ai</p>
              </div>
            </div>
            <div class="flex items-start gap-4">
              <div class="flex h-10 w-10 flex-shrink-0 items-center justify-center rounded-lg bg-orange-500/20">
                <svg class="h-5 w-5 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                </svg>
              </div>
              <div>
                <h3 class="mb-1 font-semibold">在线客服</h3>
                <p class="text-slate-300">工作日 9:00 - 18:00</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="mx-auto mt-12 max-w-4xl">
        <div class="glass-card rounded-[32px] p-8 md:p-12">
          <h2 class="mb-6 text-center text-2xl font-bold">申请演示</h2>
          <form class="space-y-6">
            <div class="grid gap-6 md:grid-cols-2">
              <div>
                <label class="mb-2 block text-sm font-medium text-slate-300">姓名</label>
                <input type="text" class="w-full rounded-lg border border-white/10 bg-white/5 px-4 py-3 text-white placeholder-slate-500 focus:border-orange-400/50 focus:outline-none focus:ring-2 focus:ring-orange-400/20" placeholder="请输入您的姓名">
              </div>
              <div>
                <label class="mb-2 block text-sm font-medium text-slate-300">公司名称</label>
                <input type="text" class="w-full rounded-lg border border-white/10 bg-white/5 px-4 py-3 text-white placeholder-slate-500 focus:border-orange-400/50 focus:outline-none focus:ring-2 focus:ring-orange-400/20" placeholder="请输入公司名称">
              </div>
            </div>
            <div class="grid gap-6 md:grid-cols-2">
              <div>
                <label class="mb-2 block text-sm font-medium text-slate-300">邮箱</label>
                <input type="email" class="w-full rounded-lg border border-white/10 bg-white/5 px-4 py-3 text-white placeholder-slate-500 focus:border-orange-400/50 focus:outline-none focus:ring-2 focus:ring-orange-400/20" placeholder="请输入邮箱地址">
              </div>
              <div>
                <label class="mb-2 block text-sm font-medium text-slate-300">电话</label>
                <input type="tel" class="w-full rounded-lg border border-white/10 bg-white/5 px-4 py-3 text-white placeholder-slate-500 focus:border-orange-400/50 focus:outline-none focus:ring-2 focus:ring-orange-400/20" placeholder="请输入联系电话">
              </div>
            </div>
            <div>
              <label class="mb-2 block text-sm font-medium text-slate-300">需求描述</label>
              <textarea rows="4" class="w-full rounded-lg border border-white/10 bg-white/5 px-4 py-3 text-white placeholder-slate-500 focus:border-orange-400/50 focus:outline-none focus:ring-2 focus:ring-orange-400/20" placeholder="请简要描述您的需求"></textarea>
            </div>
            <button type="submit" class="w-full rounded-lg bg-gradient-to-r from-orange-500 to-red-500 px-8 py-4 text-lg font-semibold text-white transition-all hover:shadow-lg hover:shadow-orange-500/50">提交申请</button>
          </form>
        </div>
      </div>
    </section>
  </div>

  <footer class="border-t border-slate-800 py-8">
    <div class="container mx-auto px-6">
      <div class="text-center text-sm text-slate-500">
        <p>© 2026 Chamie 洽小秘. All rights reserved.</p>
      </div>
    </div>
  </footer>
</body>
</html>
