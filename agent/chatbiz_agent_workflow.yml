        - id: '2'
          name: 转人工/其他
        desc: STEP 2 售中意图识别
        instructions: '你是一个珠宝电商客服问题分类器。客户已有进行中的订单。


          分类1 - 订单/物流咨询：

          - 查物流：快递到哪了、物流、运单号

          - 催发货：什么时候发、还没发

          - 修改地址/订单：改地址、改尺寸

          - 支付问题：扣款、支付失败


          分类2 - 转人工/其他：

          - 转人工客服

          - 其他无关问题'
        model:
