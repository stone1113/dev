    - data:
        classes:
        - id: '1'
          name: 售前（无订单）
        - id: '2'
          name: 售中（进行中）
        - id: '3'
          name: 售后（已完成）
        desc: STEP 1 阶段路由：根据订单状态分配售前/售中/售后
        instructions: '根据订单状态判断客户所处阶段：


          分类1 - 售前（无订单或订单状态为none）：

          客户还没有下单，处于咨询阶段


          分类2 - 售中（订单进行中：pending/processing/shipped）：

          客户已下单，订单正在处理或配送中


          分类3 - 售后（订单已完成：delivered/cancelled/refunded）：

          客户的订单已经完成、取消或退款'
        model:
          completion_params:
            temperature: 0.1
          mode: chat
          name: deepseek-chat
          provider: deepseek
        query_variable_selector:
        - '1000000001'
        - order_status
        selected: false
        title: STEP 1 阶段路由
        topics: []
        type: question-classifier
      height: 200
      id: '1000000002'
      position:
        x: 360
        y: 240
      positionAbsolute:
        x: 360
        y: 240
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        classes:
        - id: '1'
          name: 产品咨询
        - id: '2'
          name: 砍价/优惠
        - id: '3'
          name: 转人工/广告/其他
        desc: STEP 2 售前意图识别 - 18大类 60+子意图
        instructions: '你是一个珠宝电商客服问题分类器。请根据客户消息判断属于以下哪个分类：


          分类1 - 产品咨询（大部分售前问题）：

          - 询问产品价格：多少钱、什么价、价格

          - 询问材质：什么材质、14K金、18K金、会不会褪色

          - 询问尺寸：多大、尺寸、手腕

          - 产品推荐：有没有、推荐、好看的

          - 包装咨询：盒子、包装、礼盒、刻印、证书

          - 真伪咨询：正品、高仿、复刻、真假

          - 保养咨询：保养、褪色、掉色

          - 下单/支付：下单、买、付款

          - 发货咨询：发哪里、多久到、什么快递


          分类2 - 砍价/优惠：

          - 讨价还价：便宜点、少点、打折、优惠

          - 批量折扣：多买、批发

          - 活动优惠：有没有活动、满减


          分类3 - 转人工/广告/其他：

          - 转人工：转人工、人工客服

          - 广告/引流：加微信、合作、代理

          - 无法理解的消息'
        model:
          completion_params:
            temperature: 0.2
          mode: chat
          name: deepseek-chat
          provider: deepseek
        query_variable_selector:
        - '1000000001'
        - customer_message
        selected: false
        title: STEP 2 意图识别(售前)
        topics: []
        type: question-classifier
