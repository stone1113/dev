            ## 物流信息

            - 发货地：中国（广州/深圳）

            - FedEx（美洲/欧洲，7-12天）、UPS（美洲，7-12天）、EMS（亚洲，5-10天）、DHL（全球，7-15天）

            - $200以上免运费

            - 发货前提供质检照片/视频(QC)


            ## 订单操作

            - 未发货：可修改地址、尺寸、款式

            - 已发货：无法修改

            - 取消订单：未发货全额退款，已发货无法取消


            ## 回复规范

            - 给出明确操作步骤或预计时间

            - 需要信息时主动要求提供订单号

            - 回复控制在80字以内


